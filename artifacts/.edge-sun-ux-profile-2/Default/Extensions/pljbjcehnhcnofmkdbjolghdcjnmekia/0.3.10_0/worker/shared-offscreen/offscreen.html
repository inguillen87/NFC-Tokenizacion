<!doctype html>
<html>
	<head>
		<title>Shared Offscreen</title>
		<style>
			body {
				margin: 0;
				padding: 0;
			}
			#chatgpt-frame,
			#google-frame {
				width: 100%;
				height: 50vh;
				border: none;
			}
			#pii-model-frame {
				width: 0;
				height: 0;
				border: 0;
				visibility: hidden;
			}
		</style>
	</head>
	<body>
		<iframe id="chatgpt-frame"></iframe>
		<iframe id="google-frame"></iframe>
		<iframe id="pii-model-frame"></iframe>
		<script src="./offscreen-init.js" type="module"></script>
	</body>
</html>
