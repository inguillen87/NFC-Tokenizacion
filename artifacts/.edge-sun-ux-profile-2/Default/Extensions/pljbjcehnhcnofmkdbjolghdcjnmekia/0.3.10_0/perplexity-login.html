<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login to Perplexity - Bless</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
					'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
				background: #ffffff;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				padding: 20px;
			}

			.container {
				max-width: 480px;
				width: 100%;
				text-align: center;
				border: 1px solid #e5e7eb;
				border-radius: 12px;
				padding: 48px 40px;
			}

			h1 {
				font-size: 32px;
				color: #111827;
				margin-bottom: 48px;
				font-weight: 600;
			}

			.button {
				background: #20b6f6;
				color: white;
				border: none;
				border-radius: 8px;
				padding: 14px 28px;
				font-size: 15px;
				font-weight: 500;
				cursor: pointer;
				transition: all 0.2s ease;
				width: 100%;
				max-width: 300px;
			}

			.button:hover {
				background: #1a9fd9;
				transform: translateY(-1px);
			}

			.button:active {
				transform: translateY(0);
			}

			.steps {
				margin-top: 48px;
				text-align: left;
				max-width: 360px;
				margin-left: auto;
				margin-right: auto;
			}

			.steps h3 {
				font-size: 13px;
				color: #6b7280;
				margin-bottom: 20px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				font-weight: 600;
			}

			.step {
				display: flex;
				align-items: flex-start;
				margin-bottom: 16px;
			}

			.step:last-child {
				margin-bottom: 0;
			}

			.step-number {
				background: #20b6f6;
				color: white;
				width: 22px;
				height: 22px;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 12px;
				font-weight: 600;
				flex-shrink: 0;
				margin-right: 12px;
				margin-top: 1px;
			}

			.step-text {
				font-size: 14px;
				color: #374151;
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>Login to Perplexity</h1>

			<button class="button" id="loginButton">Go to Perplexity Login</button>

			<div class="steps">
				<h3>Steps</h3>
				<div class="step">
					<div class="step-number">1</div>
					<div class="step-text">Click the button to open Perplexity</div>
				</div>
				<div class="step">
					<div class="step-number">2</div>
					<div class="step-text">Sign in with your Perplexity account</div>
				</div>
			</div>
		</div>

		<script src="perplexity-login.js"></script>
	</body>
</html>
