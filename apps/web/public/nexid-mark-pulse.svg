<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="panel" x1="24" y1="24" x2="136" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2FE1C3"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(113 48) rotate(90) scale(38 38)">
      <stop offset="0" stop-color="#2FE1C3" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#2FE1C3" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="160" height="160" rx="36" fill="url(#bg)"/>
  <g filter="url(#panelShadow)">
    <rect x="24" y="24" width="112" height="112" rx="28" fill="url(#panel)" opacity="0.14"/>
    <rect x="24" y="24" width="112" height="112" rx="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
  </g>

  <circle cx="113" cy="48" r="38" fill="url(#glow)"/>

  <!-- NFC pulse arcs -->
  <g opacity="0.55" filter="url(#softShadow)" stroke="#2FE1C3" stroke-linecap="round" fill="none">
    <path d="M123 48c0-5.523-4.477-10-10-10" stroke-width="2.6" opacity="0.45"/>
    <path d="M130 48c0-9.941-8.059-18-18-18" stroke-width="2.4" opacity="0.30"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M48 102V58H58L85 91V58H96V102H86L59 69V102H48Z" fill="#E2E8F0"/>
    <path d="M107 58H118V102H107V58Z" fill="#2FE1C3"/>
    <circle cx="113" cy="48" r="8" fill="#2FE1C3"/>
  </g>
</svg>
